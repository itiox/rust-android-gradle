name: CI

# Controls when the action will run. Triggers the workflow on push or pull
# request events, but only for the `master` branch (generally) or the `citest`
# branch (for testing).
on:
  push:
    branches: [master, citest]
  pull_request:
    branches: [master]
  schedule:
    # N.b. * is a special character in YAML so you have to quote this
    # string.  10:20 UTC (2:20 Pacific), once a week on Tuesday, to
    # verify this stays healthy over time.
    - cron:  '20 10 * * 3'

jobs:
  generate_versions:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE for the job.
      - uses: actions/checkout@v4

      - name: Gradle test
        run: |
          ./gradlew -p plugin generateTestTasksJson

      - id: setup-matrix
        run: echo "::set-output name=matrix::$(cat plugin/build/build-resources/androidTestTasks.json)"

      - name: debug
        run: echo ${{ steps.setup-matrix.outputs.matrix }}

    outputs:
      matrix: ${{ steps.setup-matrix.outputs.matrix }}

  samples:
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE for the job.
      - uses: actions/checkout@v2

      - name: Setup Rust
        run: |
          rustup toolchain install stable
          rustup target add x86_64-linux-android
          rustup target add x86_64-unknown-linux-gnu
          rustup target add aarch64-linux-android

      - id: resolve-android-versions
        name: Resolve Android Versions
        shell: bash
        run: |
          COMPILE_SDK=$(grep -E '^compile_sdk=' version.properties | head -n1 | cut -d'=' -f2-)
          NDK_VERSION=$(grep -E '^ndk_version=' version.properties | head -n1 | cut -d'=' -f2-)
          NDK_RELEASE=$(grep -E '^ndk_release=' version.properties | head -n1 | cut -d'=' -f2-)
          if [ -z "$COMPILE_SDK" ]; then
            echo "compile_sdk is missing in version.properties" >&2
            exit 1
          fi
          if [ -z "$NDK_VERSION" ]; then
            echo "ndk_version is missing in version.properties" >&2
            exit 1
          fi
          if [ -z "$NDK_RELEASE" ]; then
            echo "ndk_release is missing in version.properties" >&2
            exit 1
          fi
          echo "COMPILE_SDK=${COMPILE_SDK}" >> "$GITHUB_ENV"
          echo "NDK_VERSION=${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_RELEASE=${NDK_RELEASE}" >> "$GITHUB_ENV"
          echo "compile_sdk=${COMPILE_SDK}" >> "$GITHUB_OUTPUT"
          echo "ndk_version=${NDK_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ndk_release=${NDK_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-${{ steps.resolve-android-versions.outputs.compile_sdk }} ndk;${{ steps.resolve-android-versions.outputs.ndk_version }}'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Assemble samples/app
        shell: bash
        run: |
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${{ steps.resolve-android-versions.outputs.ndk_version }}"
          ./gradlew -p samples/app :assembleDebug --info --warning-mode all

      - name: Assemble samples/library
        shell: bash
        run: |
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${{ steps.resolve-android-versions.outputs.ndk_version }}"
          ./gradlew -p samples/library :assembleDebug --info --warning-mode all

      # Work around https://github.com/actions/cache/issues/454.
      - name: Gradle stop
        run: |
          ./gradlew --stop

  android_unversioned_tests:
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE for the job.
      - uses: actions/checkout@v2

      - name: Setup Rust
        run: |
          rustup toolchain install stable
          rustup target add x86_64-linux-android
          rustup target add x86_64-unknown-linux-gnu
          rustup target add aarch64-linux-android

      - id: resolve-android-versions
        name: Resolve Android Versions
        shell: bash
        run: |
          COMPILE_SDK=$(grep -E '^compile_sdk=' version.properties | head -n1 | cut -d'=' -f2-)
          NDK_VERSION=$(grep -E '^ndk_version=' version.properties | head -n1 | cut -d'=' -f2-)
          NDK_RELEASE=$(grep -E '^ndk_release=' version.properties | head -n1 | cut -d'=' -f2-)
          if [ -z "$COMPILE_SDK" ]; then
            echo "compile_sdk is missing in version.properties" >&2
            exit 1
          fi
          if [ -z "$NDK_VERSION" ]; then
            echo "ndk_version is missing in version.properties" >&2
            exit 1
          fi
          if [ -z "$NDK_RELEASE" ]; then
            echo "ndk_release is missing in version.properties" >&2
            exit 1
          fi
          echo "COMPILE_SDK=${COMPILE_SDK}" >> "$GITHUB_ENV"
          echo "NDK_VERSION=${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_RELEASE=${NDK_RELEASE}" >> "$GITHUB_ENV"
          echo "compile_sdk=${COMPILE_SDK}" >> "$GITHUB_OUTPUT"
          echo "ndk_version=${NDK_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ndk_release=${NDK_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-${{ steps.resolve-android-versions.outputs.compile_sdk }} ndk;${{ steps.resolve-android-versions.outputs.ndk_version }}'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Gradle setup
        shell: bash
        run: |
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${{ steps.resolve-android-versions.outputs.ndk_version }}"
          ./gradlew -p plugin tasks --warning-mode all

      - name: Gradle test
        shell: bash
        run: |
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${{ steps.resolve-android-versions.outputs.ndk_version }}"
          ./gradlew -p plugin test --info --warning-mode all

      # Work around https://github.com/actions/cache/issues/454.
      - name: Gradle stop
        run: |
          ./gradlew --stop

  android_version_tests:
    needs: [generate_versions] # , sanity_check]

    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        androidTestTask: ${{ fromJson(needs.generate_versions.outputs.matrix) }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup toolchain install stable
          rustup target add x86_64-linux-android
          rustup target add x86_64-unknown-linux-gnu
          rustup target add aarch64-linux-android

      - id: resolve-android-versions
        name: Resolve Android Versions
        shell: bash
        run: |
          COMPILE_SDK=$(grep -E '^compile_sdk=' version.properties | head -n1 | cut -d'=' -f2-)
          NDK_VERSION=$(grep -E '^ndk_version=' version.properties | head -n1 | cut -d'=' -f2-)
          NDK_RELEASE=$(grep -E '^ndk_release=' version.properties | head -n1 | cut -d'=' -f2-)
          if [ -z "$COMPILE_SDK" ]; then
            echo "compile_sdk is missing in version.properties" >&2
            exit 1
          fi
          if [ -z "$NDK_VERSION" ]; then
            echo "ndk_version is missing in version.properties" >&2
            exit 1
          fi
          if [ -z "$NDK_RELEASE" ]; then
            echo "ndk_release is missing in version.properties" >&2
            exit 1
          fi
          echo "COMPILE_SDK=${COMPILE_SDK}" >> "$GITHUB_ENV"
          echo "NDK_VERSION=${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_RELEASE=${NDK_RELEASE}" >> "$GITHUB_ENV"
          echo "compile_sdk=${COMPILE_SDK}" >> "$GITHUB_OUTPUT"
          echo "ndk_version=${NDK_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ndk_release=${NDK_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-${{ steps.resolve-android-versions.outputs.compile_sdk }} ndk;${{ steps.resolve-android-versions.outputs.ndk_version }}'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Gradle setup
        shell: bash
        run: |
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${{ steps.resolve-android-versions.outputs.ndk_version }}"
          ./gradlew -p plugin tasks --warning-mode all

      - name: Gradle test
        shell: bash
        run: |
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${{ steps.resolve-android-versions.outputs.ndk_version }}"
          ./gradlew -p plugin ${{ matrix.androidTestTask }} --info --warning-mode all

      # Work around https://github.com/actions/cache/issues/454.
      - name: Gradle stop
        run: |
          ./gradlew --stop
